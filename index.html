<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing App</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <div class="control-group">
                <button id="drawBtn" class="icon-btn active" title="Brush">
                    <img src="img/Brush.png" alt="Brush">
                </button>
                <button id="eraserBtn" class="icon-btn" title="Eraser">
                    <img src="img/Eraser.png" alt="Eraser">
                </button>
            </div>
            <div class="control-group">
                <label for="colorPicker">Color</label>
                <input type="color" id="colorPicker" value="#000000">
            </div>
            <div class="control-group">
                <label for="lineWidth">Size</label>
                <input type="range" id="lineWidth" min="1" max="80" value="5">
            </div>
            <button id="clearBtn">Clear All</button>
        </div>
        <canvas id="drawingCanvas" class="card" width="900" height="600"></canvas>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
